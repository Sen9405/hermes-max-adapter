repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        additional_dependencies: ['requests']
        args:
          - "--baseline"
          - ".secrets.baseline"
          - "--exclude-files"
          - '.venv/|__pycache__/|\.git/|node_modules/|\.pytest_cache/|\.ruff_cache/'
